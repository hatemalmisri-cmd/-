<!doctype html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Flappy Bird — لعبة بسيطة</title>
<style>
  html, body { height: 100%; margin: 0; }
  body {
    background: #70c5ce;
    font-family: system-ui, -apple-system, "Segoe UI", Tahoma, Arial, sans-serif;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px;
  }
  canvas {
    background: #70c5ce;
    border: 4px solid #1f1a15;
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,.25);
    image-rendering: pixelated;
    touch-action: manipulation;
  }
  .hud { color: #fff; text-align: center; }
  .hud h1 { margin: 0 0 4px; font-size: 18px; }
  .hud p { margin: 0; opacity: .9; font-size: 13px; }
</style>
</head>
<body>
  <canvas id="game" width="400" height="600" aria-label="لعبة Flappy Bird"></canvas>
  <div class="hud">
    <h1>Flappy Bird</h1>
    <p>اضغط Space أو انقر/المس الشاشة للقفز</p>
  </div>

<script>
(() => {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  const GROUND_Y = Math.floor(H * 0.85);

  const GRAVITY = 0.45;
  const FLAP = -7.5;
  const PIPE_W = 56;
  const PIPE_GAP = 140;
  const PIPE_SPEED = 2.2;
  const PIPE_INTERVAL = 90;

  const bird = { x: 90, y: H / 2, r: 14, vy: 0 };
  let pipes = [];
  let frame = 0;
  let score = 0;
  let best = parseInt(localStorage.getItem('flappy_best') || '0', 10);
  let state = 'ready'; // ready | playing | over

  function reset() {
    bird.y = H / 2;
    bird.vy = 0;
    pipes = [];
    frame = 0;
    score = 0;
    state = 'ready';
  }

  function flap() {
    if (state === 'over') { reset(); }
    if (state === 'ready') { state = 'playing'; }
    bird.vy = FLAP;
  }

  document.addEventListener('keydown', e => {
    if (e.code === 'Space' || e.code === 'ArrowUp') { e.preventDefault(); flap(); }
  });
  canvas.addEventListener('mousedown', flap);
  canvas.addEventListener('touchstart', e => { e.preventDefault(); flap(); }, { passive: false });

  function spawnPipe() {
    const minTop = 40;
    const maxTop = GROUND_Y - PIPE_GAP - 40;
    const top = minTop + Math.random() * (maxTop - minTop);
    pipes.push({ x: W + 10, top, passed: false });
  }

  function update() {
    if (state !== 'playing') return;

    bird.vy += GRAVITY;
    bird.y += bird.vy;

    if (frame % PIPE_INTERVAL === 0) spawnPipe();
    frame++;

    for (const p of pipes) {
      p.x -= PIPE_SPEED;
      if (!p.passed && p.x + PIPE_W < bird.x) {
        p.passed = true;
        score++;
      }
    }
    pipes = pipes.filter(p => p.x + PIPE_W > -20);

    if (bird.y + bird.r > GROUND_Y || bird.y - bird.r < 0) return gameOver();
    for (const p of pipes) {
      const inX = bird.x + bird.r > p.x && bird.x - bird.r < p.x + PIPE_W;
      if (!inX) continue;
      const hitTop = bird.y - bird.r < p.top;
      const hitBottom = bird.y + bird.r > p.top + PIPE_GAP;
      if (hitTop || hitBottom) return gameOver();
    }
  }

  function gameOver() {
    state = 'over';
    if (score > best) {
      best = score;
      localStorage.setItem('flappy_best', String(best));
    }
  }

  function drawBackground() {
    ctx.fillStyle = '#70c5ce';
    ctx.fillRect(0, 0, W, GROUND_Y);
    // distant clouds
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    for (let i = 0; i < 4; i++) {
      const cx = ((i * 130) - (frame * 0.3) % 520 + 520) % 520 - 60;
      ctx.beginPath();
      ctx.arc(cx, 80 + (i % 2) * 30, 22, 0, Math.PI * 2);
      ctx.arc(cx + 18, 80 + (i % 2) * 30, 18, 0, Math.PI * 2);
      ctx.arc(cx - 18, 80 + (i % 2) * 30, 16, 0, Math.PI * 2);
      ctx.fill();
    }
    // ground
    ctx.fillStyle = '#ded895';
    ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
    ctx.fillStyle = '#c2b280';
    ctx.fillRect(0, GROUND_Y, W, 6);
    // grass stripes
    ctx.fillStyle = '#7bc043';
    for (let x = 0; x < W; x += 16) {
      ctx.fillRect(x - (frame * PIPE_SPEED) % 16, GROUND_Y - 4, 8, 4);
    }
  }

  function drawPipes() {
    for (const p of pipes) {
      // body
      ctx.fillStyle = '#5cb85c';
      ctx.fillRect(p.x, 0, PIPE_W, p.top);
      ctx.fillRect(p.x, p.top + PIPE_GAP, PIPE_W, GROUND_Y - (p.top + PIPE_GAP));
      // outline
      ctx.strokeStyle = '#2e7d32';
      ctx.lineWidth = 2;
      ctx.strokeRect(p.x, 0, PIPE_W, p.top);
      ctx.strokeRect(p.x, p.top + PIPE_GAP, PIPE_W, GROUND_Y - (p.top + PIPE_GAP));
      // lips
      ctx.fillStyle = '#5cb85c';
      ctx.fillRect(p.x - 4, p.top - 14, PIPE_W + 8, 14);
      ctx.fillRect(p.x - 4, p.top + PIPE_GAP, PIPE_W + 8, 14);
      ctx.strokeRect(p.x - 4, p.top - 14, PIPE_W + 8, 14);
      ctx.strokeRect(p.x - 4, p.top + PIPE_GAP, PIPE_W + 8, 14);
    }
  }

  function drawBird() {
    ctx.save();
    ctx.translate(bird.x, bird.y);
    const angle = Math.max(-0.5, Math.min(1.0, bird.vy / 10));
    ctx.rotate(angle);
    // body
    ctx.fillStyle = '#ffd84d';
    ctx.beginPath();
    ctx.arc(0, 0, bird.r, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#7a5b00';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // wing
    ctx.fillStyle = '#ffb000';
    const wingY = 2 + Math.sin(frame * 0.3) * 2;
    ctx.beginPath();
    ctx.ellipse(-2, wingY, 8, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    // eye
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(5, -4, 4, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(6, -4, 2, 0, Math.PI * 2);
    ctx.fill();
    // beak
    ctx.fillStyle = '#ff8a00';
    ctx.beginPath();
    ctx.moveTo(bird.r - 2, -2);
    ctx.lineTo(bird.r + 9, 1);
    ctx.lineTo(bird.r - 2, 4);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#aa5a00';
    ctx.stroke();
    ctx.restore();
  }

  function drawText(text, x, y, size) {
    ctx.font = `bold ${size}px system-ui, sans-serif`;
    ctx.textAlign = 'center';
    ctx.lineWidth = 4;
    ctx.strokeStyle = '#000';
    ctx.fillStyle = '#fff';
    ctx.strokeText(text, x, y);
    ctx.fillText(text, x, y);
  }

  function drawHUD() {
    drawText(String(score), W / 2, 64, 40);
    if (state === 'ready') {
      drawText('اضغط للبدء', W / 2, H / 2 - 30, 22);
      drawText('Space / Click / Tap', W / 2, H / 2, 16);
    }
    if (state === 'over') {
      drawText('انتهت اللعبة', W / 2, H / 2 - 40, 26);
      drawText('النتيجة: ' + score, W / 2, H / 2 - 8, 18);
      drawText('الأفضل: ' + best, W / 2, H / 2 + 18, 18);
      drawText('اضغط للإعادة', W / 2, H / 2 + 50, 18);
    }
  }

  function loop() {
    update();
    drawBackground();
    drawPipes();
    drawBird();
    drawHUD();
    requestAnimationFrame(loop);
  }

  loop();
})();
</script>
</body>
</html>
